<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 md:p-12">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>
  
  <!-- Modal Content -->
  <div class="relative bg-white dark:bg-[#1e1e1e] w-full max-w-5xl h-full max-h-[85vh] rounded-xl shadow-2xl flex flex-col border border-gray-200 dark:border-gray-700 overflow-hidden transform transition-all">
    
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-[#252526]">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-2">
        <i class="fa-solid fa-code text-blue-500"></i> {{ title }}
      </h3>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors p-1 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
        <i class="fa-solid fa-xmark text-lg w-6 h-6 flex items-center justify-center"></i>
      </button>
    </div>
    
    <!-- Editor Container -->
    <div class="flex-1 w-full relative bg-[#2d2d2d] min-h-0">
      <div #editorContainer class="absolute inset-0 w-full h-full"></div>
    </div>
    
  </div>
</div>
