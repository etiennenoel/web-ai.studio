<div class="bg-[#ffffff] dark:bg-[#161616] !rounded-3xl shadow-xl overflow-hidden flex flex-col h-full border border-slate-200 dark:border-zinc-800">
  <div class="p-5 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center bg-slate-50 dark:bg-[#161616]/50">
    <h5 class="text-lg font-semibold text-slate-800 dark:text-slate-100 m-0 flex items-center gap-2"><i class="bi bi-camera"></i> Take Photo</h5>
    <button type="button" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors focus:outline-none bg-transparent border-none" (click)="activeModal.dismiss()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  <div class="p-6 bg-slate-100 dark:bg-black/50 flex flex-col items-center justify-center relative min-h-[300px] flex-grow">
    @if (error) {
      <div class="text-red-500 flex flex-col items-center gap-2 font-medium">
        <i class="bi bi-exclamation-triangle text-3xl"></i> {{ error }}
      </div>
    } @else {
      <video #videoElement autoplay playsinline class="w-full max-h-[60vh] object-contain !rounded-xl shadow-sm bg-black dark:bg-[#121212]"></video>
      <canvas #canvasElement class="hidden"></canvas>
    }
  </div>
  <div class="p-4 border-t border-slate-100 dark:border-zinc-800 bg-slate-50 dark:bg-[#161616]/50 flex justify-end gap-3 mt-auto">
    <button type="button" class="px-4 py-2 !rounded-xl text-sm font-medium bg-[#ffffff] dark:bg-zinc-800 border border-slate-300 dark:border-zinc-700 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-zinc-700 transition-colors focus:outline-none" (click)="activeModal.dismiss()">Cancel</button>
    <button type="button" class="px-4 py-2 !rounded-xl text-sm font-medium bg-indigo-600 hover:bg-indigo-700 text-white border-none transition-colors shadow-sm focus:outline-none flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" [disabled]="!!error" (click)="capture()">
      <i class="bi bi-camera-fill"></i> Capture
    </button>
  </div>
</div>
