<div class="p-2 pt-3">
<h1 class="text-center">WebAI Studio</h1>

  <ul class="nav flex-column mt-3 gap-1">
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Chat">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Chat)">
        <i class="bi bi-chat-left me-2"></i>
        <span>Chat</span>
      </a>
    </li>
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Translation">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Translation)">
        <i class="bi bi-translate me-2"></i>
        <span>Translation</span>
      </a>
    </li>
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.WritingAssistance">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.WritingAssistance)">
        <i class="bi bi-pencil-square me-2"></i>
        <span>Writing Assistance</span>
      </a>
    </li>

    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Evals">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Evals)">
        <i class="bi bi-search-heart me-2"></i>
        <span>Evals</span>
      </a>
    </li>

    <li class="nav-item" [class.active]="routeEnum === RouteEnum.MediaGeneration">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Chat)">
        <i class="bi bi-chat-left-heart me-2"></i>
        <span>Media Generation</span>
        <span class="badge rounded-pill bg-warning ms-2">WIP</span>
      </a>
    </li>
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Build">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Chat)">
        <i class="bi bi-puzzle me-2"></i>
        <span>Build</span>
        <span class="badge rounded-pill bg-warning ms-2">WIP</span>
      </a>
    </li>
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Demos">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Chat)">
        <i class="bi bi-display me-2"></i>
        <span>Demos</span>
        <span class="badge rounded-pill bg-warning ms-2">WIP</span>
      </a>
    </li>
    <li class="nav-item" [class.active]="routeEnum === RouteEnum.Cortex">
      <a class="nav-link d-flex align-items-center" [routerLink]="getRouterLink(RouteEnum.Cortex)">
        <img style="width:15px;" class="bi me-2" src="images/cortex-icon.png">
        <span>Cortex</span>
        <span class="badge rounded-pill bg-warning ms-2">WIP</span>
      </a>
    </li>
  </ul>
</div>
