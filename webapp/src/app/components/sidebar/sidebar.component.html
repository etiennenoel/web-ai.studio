<div class="flex flex-col h-full bg-slate-50 dark:bg-[#121212] border-r border-slate-200 dark:border-zinc-800 transition-colors duration-200 overflow-y-auto">
  <div class="p-4 flex-grow flex flex-col">
    <!-- Logo -->
    <div class="mb-8 mt-2 px-2 flex justify-center items-center h-10">
      <img src="images/webai-logo.png" alt="WebAI Studio Logo" class="h-10 w-10 object-contain drop-shadow-sm">
    </div>

    <!-- Navigation -->
    <nav class="flex flex-col gap-1.5">
      <!-- Chat -->
      <a [routerLink]="getRouterLink(RouteEnum.Chat)"
         class="!no-underline flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Chat ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-600 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-900 dark:hover:!text-white'">
        <i class="bi bi-chat-left text-lg w-7 flex justify-start"></i>
        <span>Chat</span>
      </a>

      <!-- Translation -->
      <a [routerLink]="getRouterLink(RouteEnum.Translation)"
         class="!no-underline flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Translation ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-600 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-900 dark:hover:!text-white'">
        <i class="bi bi-translate text-lg w-7 flex justify-start"></i>
        <span>Translation</span>
      </a>

      <!-- Writing Assistance -->
      <a [routerLink]="getRouterLink(RouteEnum.WritingAssistance)"
         class="!no-underline flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.WritingAssistance ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-600 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-900 dark:hover:!text-white'">
        <i class="bi bi-pencil-square text-lg w-7 flex justify-start"></i>
        <span>Writing Assistance</span>
      </a>

      <!-- Evals -->
      <a [routerLink]="getRouterLink(RouteEnum.Evals)"
         class="!no-underline flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Evals ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-600 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-900 dark:hover:!text-white'">
        <i class="bi bi-search-heart text-lg w-7 flex justify-start"></i>
        <span>Evals</span>
      </a>

      <div class="my-2 border-t border-slate-200 dark:border-zinc-800/80"></div>

      <!-- Extension -->
      <a [routerLink]="getRouterLink(RouteEnum.Extension)" target="_blank" rel="noopener noreferrer"
         class="!no-underline flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer group"
         [ngClass]="routeEnum === RouteEnum.Extension ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-600 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-900 dark:hover:!text-white'">
        <div class="flex items-center">
          <i class="bi bi-puzzle text-lg w-7 flex justify-start"></i>
          <span>Extension</span>
        </div>
        <i class="bi bi-box-arrow-up-right text-xs opacity-50 group-hover:opacity-100 transition-opacity"></i>
      </a>

      <div class="mt-4 mb-2 px-3 text-[10px] font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase">
        Experimental
      </div>

      <!-- Media Gen -->
      <a [routerLink]="getRouterLink(RouteEnum.Chat)"
         class="!no-underline group flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.MediaGeneration ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-500 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-800 dark:hover:!text-white'">
        <div class="flex items-center">
          <i class="bi bi-chat-left-heart text-lg w-7 flex justify-start opacity-70 group-hover:opacity-100 transition-opacity"></i>
          <span>Media Gen</span>
        </div>
        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-200/70 dark:!bg-zinc-700 !text-slate-500 dark:!text-slate-300">WIP</span>
      </a>

      <!-- Build -->
      <a [routerLink]="getRouterLink(RouteEnum.Chat)"
         class="!no-underline group flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Build ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-500 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-800 dark:hover:!text-white'">
        <div class="flex items-center">
          <i class="bi bi-tools text-lg w-7 flex justify-start opacity-70 group-hover:opacity-100 transition-opacity"></i>
          <span>Build</span>
        </div>
        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-200/70 dark:!bg-zinc-700 !text-slate-500 dark:!text-slate-300">WIP</span>
      </a>

      <!-- Demos -->
      <a [routerLink]="getRouterLink(RouteEnum.Chat)"
         class="!no-underline group flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Demos ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-500 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-800 dark:hover:!text-white'">
        <div class="flex items-center">
          <i class="bi bi-display text-lg w-7 flex justify-start opacity-70 group-hover:opacity-100 transition-opacity"></i>
          <span>Demos</span>
        </div>
        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-200/70 dark:!bg-zinc-700 !text-slate-500 dark:!text-slate-300">WIP</span>
      </a>

      <!-- Cortex -->
      <a [routerLink]="getRouterLink(RouteEnum.Cortex)" target="_blank" rel="noopener noreferrer"
         class="!no-underline group flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 cursor-pointer"
         [ngClass]="routeEnum === RouteEnum.Cortex ? 'bg-[#ffffff] dark:bg-zinc-800 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/60 dark:ring-zinc-700' : '!text-slate-500 dark:!text-slate-400 hover:bg-slate-200/60 dark:hover:bg-zinc-800/50 hover:!text-slate-800 dark:hover:!text-white'">
        <div class="flex items-center">
          <div class="w-7 flex justify-start">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
              <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
              <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
              <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/>
              <path d="M6.002 5.125A3 3 0 0 0 6.401 6.5"/>
              <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
              <path d="M19.938 10.5a4 4 0 0 1 .585.396"/>
              <path d="M6 18a4 4 0 0 1-1.967-.516"/>
              <path d="M19.967 17.484A4 4 0 0 1 18 18"/>
            </svg>
          </div>
          <span>Cortex</span>
        </div>
        <div class="flex items-center gap-1.5">
          <i class="bi bi-box-arrow-up-right text-xs opacity-50 group-hover:opacity-100 transition-opacity"></i>
          <span class="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-200/70 dark:!bg-zinc-700 !text-slate-500 dark:!text-slate-300">WIP</span>
        </div>
      </a>

    </nav>
  </div>
  
  <!-- Footer -->
  <div class="p-4 flex flex-col items-center gap-3 border-t border-slate-200/50 dark:border-zinc-800/50 bg-slate-50 dark:bg-[#121212]">
    
    <!-- Theme Toggle -->
    <div class="flex items-center justify-center p-1 bg-slate-200/50 dark:bg-zinc-800/80 !rounded-xl w-full" *ngIf="currentTheme$ | async as currentTheme">
      <button type="button" (click)="setTheme('light')" title="Light Theme"
              class="flex-1 py-1.5 !rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center border-none outline-none focus:outline-none focus:ring-0 m-0"
              [ngClass]="currentTheme === 'light' ? 'bg-[#ffffff] dark:bg-zinc-700 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/50 dark:ring-zinc-600/50' : 'bg-transparent !text-slate-500 hover:!text-slate-800 dark:!text-slate-400 dark:hover:!text-slate-200'">
        <i class="bi bi-sun-fill"></i>
      </button>
      <button type="button" (click)="setTheme('auto')" title="System Theme"
              class="flex-1 py-1.5 !rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center border-none outline-none focus:outline-none focus:ring-0 m-0"
              [ngClass]="currentTheme === 'auto' ? 'bg-[#ffffff] dark:bg-zinc-700 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/50 dark:ring-zinc-600/50' : 'bg-transparent !text-slate-500 hover:!text-slate-800 dark:!text-slate-400 dark:hover:!text-slate-200'">
        <i class="bi bi-circle-half"></i>
      </button>
      <button type="button" (click)="setTheme('dark')" title="Dark Theme"
              class="flex-1 py-1.5 !rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center border-none outline-none focus:outline-none focus:ring-0 m-0"
              [ngClass]="currentTheme === 'dark' ? 'bg-[#ffffff] dark:bg-zinc-700 !text-slate-900 dark:!text-white shadow-sm ring-1 ring-slate-200/50 dark:ring-zinc-600/50' : 'bg-transparent !text-slate-500 hover:!text-slate-800 dark:!text-slate-400 dark:hover:!text-slate-200'">
        <i class="bi bi-moon-stars-fill"></i>
      </button>
    </div>

    <div class="flex items-center justify-center gap-3 text-xs !text-slate-400 dark:!text-slate-500">
      <a [routerLink]="getRouterLink(RouteEnum.PrivacyPolicy)" class="!no-underline !text-slate-400 dark:!text-slate-500 hover:!text-slate-600 dark:hover:!text-slate-300 transition-colors">Privacy</a>
      <span class="opacity-50">&bull;</span>
      <a [routerLink]="getRouterLink(RouteEnum.TermsOfService)" class="!no-underline !text-slate-400 dark:!text-slate-500 hover:!text-slate-600 dark:hover:!text-slate-300 transition-colors">Terms</a>
    </div>
  </div>
</div>
