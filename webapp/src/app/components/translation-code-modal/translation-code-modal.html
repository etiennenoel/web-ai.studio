<div class="modal-header">
  <h4 class="modal-title flex items-center gap-2 text-lg font-semibold text-slate-800 dark:text-slate-100">
    <i class="bi bi-code-square"></i> Get Translation Code
  </h4>
  <button type="button" class="btn-close dark:invert" aria-label="Close" (click)="activeModal.dismiss('Cross click')"></button>
</div>
<div class="modal-body flex flex-col gap-3 p-4 bg-slate-50 dark:bg-[#121212]">
  <div class="w-full">
    <select class="form-select bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-900 dark:text-slate-100 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" aria-label="Language Select" [formControl]="languageFormControl">
      <option value="typescript">Typescript</option>
      <option value="javascript">Javascript</option>
    </select>
  </div>
  <app-code-editor
    [code]="code"
    [height]="'400px'"
  ></app-code-editor>
</div>
