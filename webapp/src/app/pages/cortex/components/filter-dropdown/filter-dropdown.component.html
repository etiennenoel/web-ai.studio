<div class="relative filter-dropdown">
  <button (click)="filterService.toggleDropdown(filterType, $event)"
    class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-[10px] font-semibold transition-all"
    [ngClass]="isFiltered
      ? 'bg-indigo-50 border-indigo-200 text-indigo-700 dark:bg-indigo-500/10 dark:border-indigo-500/30 dark:text-indigo-400'
      : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700 dark:bg-slate-900 dark:border-slate-800 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-200'">
    <span class="opacity-60">{{ label }}</span>
    <span [ngClass]="isFiltered ? 'text-indigo-600 dark:text-indigo-300' : 'text-slate-700 dark:text-slate-200'">{{ selectionLabel }}</span>
    <i class="bi bi-chevron-down opacity-50 ml-0.5 text-[9px]"></i>
  </button>
  @if (filterService.activeDropdown === filterType) {
    <div class="absolute top-full right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden z-[100] dark:bg-slate-900 dark:border-slate-800 {{ dropdownWidth }}" (click)="$event.stopPropagation()">
      <div class="p-2 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-10">
        <input type="text" placeholder="Search..."
          class="w-full text-[10px] px-2 py-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-800 dark:text-slate-200 placeholder-slate-400"
          (input)="filterService.onDropdownSearch(filterType, $event)"
          [value]="filterService.dropdownSearch[filterType] || ''">
      </div>
      <div class="max-h-48 overflow-y-auto py-1">
        @for (opt of filterService.getFilteredOptions(filterType); track opt) {
          <label class="w-full flex items-center px-3 py-1.5 text-[10px] font-medium hover:bg-slate-50 transition-colors cursor-pointer dark:hover:bg-slate-800"
            [class.text-indigo-600]="filterService.isFilterSelected(filterType, opt)"
            [class.text-slate-700]="!filterService.isFilterSelected(filterType, opt)"
            [class.dark:text-indigo-400]="filterService.isFilterSelected(filterType, opt)"
            [class.dark:text-slate-300]="!filterService.isFilterSelected(filterType, opt)">
            <input type="checkbox"
              class="mr-2 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 bg-white dark:border-slate-600 dark:text-indigo-500 dark:bg-slate-800 w-3 h-3"
              [checked]="filterService.isFilterSelected(filterType, opt)"
              (change)="filterService.selectFilter(filterType, opt, $event.target.checked)">
            {{ opt }}
          </label>
        }
      </div>
    </div>
  }
</div>
