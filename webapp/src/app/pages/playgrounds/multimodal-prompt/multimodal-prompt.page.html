<div class="h-full flex flex-col bg-[#ffffff] dark:bg-[#121212] font-sans">
  <div class="p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Multimodal Prompt API Playground</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Test image and audio prompting.</p>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="checkAvailability()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-zinc-800 text-slate-700 dark:text-slate-200 text-sm font-medium rounded-lg">
          Check Availability
        </button>
        <span *ngIf="availabilityStatus" class="text-xs font-mono px-2 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 rounded border border-indigo-200">
          {{availabilityStatus}}
        </span>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-hidden flex flex-col lg:flex-row">
    <div class="w-full lg:w-1/2 h-full overflow-y-auto p-6 pb-32 border-r border-slate-200 dark:border-zinc-800">
      <form [formGroup]="playgroundForm" class="space-y-8 max-w-2xl mx-auto">
        <section class="bg-slate-50 dark:bg-zinc-900/50 p-5 rounded-xl border border-slate-200 dark:border-zinc-800">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Create Options</h2>

          <div class="mb-5">
            <div class="flex justify-between items-center mb-2">
              <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Expected Inputs</label>
              <button type="button" (click)="addExpectedInput()" class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">Add</button>
            </div>
            <div formArrayName="expectedInputs" class="space-y-2">
              <div *ngFor="let e of expectedInputs.controls; let i=index" [formGroupName]="i" class="flex gap-2">
                <select formControlName="type" class="flex-1 text-sm bg-white border border-slate-300 rounded px-2 py-1.5 dark:bg-[#121212] dark:border-zinc-700 dark:text-white">
                  <option value="image">image</option>
                  <option value="audio">audio</option>
                  <option value="text">text</option>
                </select>
                <button type="button" (click)="removeExpectedInput(i)" class="text-red-500 px-2"><i class="bi bi-trash"></i></button>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <button *ngIf="!session && !isCreating" type="button" (click)="createSession()" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg">
              Create Session
            </button>
            <button *ngIf="isCreating" type="button" disabled class="flex-1 py-2.5 bg-indigo-400 text-white text-sm font-semibold rounded-lg cursor-not-allowed">
              Creating...
            </button>
            <button *ngIf="session" type="button" (click)="destroySession()" class="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-lg">
              Destroy Session
            </button>
          </div>
          
          <div *ngIf="isDownloading" class="mt-3">
            <div class="w-full bg-slate-200 rounded-full h-1.5 mb-1 dark:bg-zinc-700">
              <div class="bg-indigo-600 h-1.5 rounded-full dark:bg-indigo-500" [style.width]="downloadProgress + '%'"></div>
            </div>
          </div>
        </section>

        <section class="bg-slate-50 dark:bg-zinc-900/50 p-5 rounded-xl border border-slate-200 dark:border-zinc-800" [class.opacity-50]="!session">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Execution</h2>
          
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Image Upload</label>
            <input type="file" accept="image/*" (change)="onImageSelected($event)" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 dark:file:bg-zinc-800 dark:file:text-indigo-400">
          </div>
          
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Audio Upload</label>
            <input type="file" accept="audio/*" (change)="onAudioSelected($event)" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 dark:file:bg-zinc-800 dark:file:text-indigo-400">
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Prompt Text</label>
            <textarea formControlName="promptInput" rows="3" class="w-full text-sm bg-white dark:bg-[#121212] border border-slate-300 dark:border-zinc-700 rounded-lg px-3 py-2 text-slate-900 dark:text-white outline-none"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3 mb-3">
            <button type="button" [disabled]="!session || isPrompting" (click)="runPrompt()" class="py-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg">
              {{ isPrompting ? 'Running...' : 'Prompt Multimodal' }}
            </button>
            <button *ngIf="isPrompting" type="button" (click)="abortPrompt()" class="py-2 bg-red-100 hover:bg-red-200 text-red-700 text-sm font-semibold rounded-lg">
              Abort
            </button>
          </div>
        </section>

      </form>
    </div>

    <!-- Right Column: Results & Code -->
    <div class="w-full lg:w-1/2 h-full flex flex-col bg-slate-50 dark:bg-[#161616]">
      <div class="flex-1 p-6 pb-32 overflow-y-auto">
        <h3 class="text-sm font-bold text-slate-900 dark:text-slate-300 mb-3 tracking-wider uppercase">Execution Output</h3>
        <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 text-red-700 rounded-xl text-sm">{{errorMessage}}</div>
        <div class="bg-white dark:bg-[#1e1e1e] border border-slate-200 dark:border-zinc-800 rounded-xl p-4 min-h-[200px] whitespace-pre-wrap text-sm text-slate-800 dark:text-slate-200 shadow-sm">
          <span *ngIf="!fullOutput && !isPrompting" class="text-slate-400 italic">Output will appear here...</span>
          {{fullOutput}}
        </div>
      </div>
      <div class="h-1/2 border-t border-slate-200 dark:border-zinc-800 bg-[#1e1e1e] flex flex-col">
        <div class="p-3 border-b border-zinc-800 bg-zinc-900 flex justify-between items-center shrink-0">
          <h3 class="text-xs font-bold text-zinc-300 uppercase tracking-wider">Generated Code</h3>
        </div>
        <div class="flex-1 overflow-y-auto p-4 pb-32">
          <pre class="text-xs text-emerald-400 font-mono"><code>{{generatedCode}}</code></pre>
        </div>
      </div>
    </div>
  </div>
</div>
